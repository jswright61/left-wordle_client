<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Migration Test Harness — Left Wordle</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f7f8;
      --border: #d3d6da;
      --text: #1a1a1b;
      --muted: #787c7e;
      --correct: #6aaa64;
      --present: #c9b458;
      --absent: #787c7e;
      --accent: #538d4e;
      --added-bg: #d4edda;
      --changed-bg: #fff3cd;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --mono: 'SFMono-Regular', Consolas, 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    #sidebar-header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    #fixture-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    #fixture-list li {
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 2px;
      line-height: 1.35;
    }

    #fixture-list li:hover { background: var(--border); }
    #fixture-list li.active { background: var(--accent); color: #fff; }

    #fixture-list li .num {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      display: block;
    }

    #fixture-list li.active .num { color: rgba(255,255,255,0.65); }
    #fixture-list li .label { font-size: 12px; }

    /* ── Main content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    #placeholder {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
    }

    .hidden { display: none !important; }

    #fixture-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    /* ── Two-column JSON panels ── */
    .json-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-head {
      padding: 9px 13px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-head h3 { font-size: 12px; font-weight: 700; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--absent);
      color: #fff;
      letter-spacing: 0.03em;
    }

    .badge.green { background: var(--correct); }
    .badge.yellow { background: var(--present); }

    .json-view {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.55;
      overflow-y: auto;
      max-height: 380px;
    }

    details.key-block {
      border-bottom: 1px solid var(--border);
    }
    details.key-block:last-child { border-bottom: none; }

    summary.key-summary {
      padding: 5px 13px 5px 9px;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: baseline;
      gap: 4px;
      user-select: none;
    }
    summary.key-summary::-webkit-details-marker { display: none; }

    .key-toggle { font-size: 8px; color: var(--muted); width: 10px; flex-shrink: 0; }
    summary.key-summary > .key-toggle::before { content: '▶'; }
    details[open] > summary.key-summary > .key-toggle::before { content: '▼'; }

    .key-scalar { padding: 5px 13px 5px 23px; }

    pre.key-value {
      margin: 0;
      padding: 0 13px 8px 23px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    details.key-block.added > summary.key-summary,
    details.key-block.added > pre.key-value { background: var(--added-bg); }
    .key-scalar.added { background: var(--added-bg); }

    /* JSON syntax colours */
    .jk { color: #905; }
    .js { color: #077; }
    .jn { color: #0086b3; }
    .jb { color: #ae81ff; }
    .jx { color: #999; }

    /* ── Bottom row: stats + summary ── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 14px;
    }

    /* ── Stats modal ── */
    .stats-body { padding: 16px 14px; }

    #stat-tiles {
      display: flex;
      justify-content: space-around;
      margin-bottom: 16px;
    }

    .stat-tile { text-align: center; min-width: 44px; }
    .stat-tile .val { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-tile .lbl { font-size: 9px; color: var(--muted); margin-top: 3px; }

    #distribution { width: 100%; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .bar-num { width: 12px; text-align: right; font-weight: 700; }
    .bar-track { flex: 1; }

    .bar {
      background: var(--absent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 5px;
      min-width: 22px;
      text-align: right;
      border-radius: 2px;
    }

    .no-data { text-align: center; color: var(--muted); font-size: 12px; padding: 10px 0; }

    /* ── Migration summary ── */
    #summary-list { list-style: none; padding: 8px 0; }

    .s-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--surface);
    }

    .s-item:last-child { border-bottom: none; }

    .s-icon {
      width: 17px; height: 17px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .s-icon.ok      { background: var(--correct); color: #fff; }
    .s-icon.skip    { background: var(--border); color: var(--muted); }
    .s-icon.warn    { background: var(--present); color: #fff; }

    .s-text { flex: 1; line-height: 1.4; font-size: 12px; }
    .s-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Stats comparison header ── */
    .stats-compare {
      display: flex;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stats-compare span { font-weight: 600; }
    .stats-compare .before-val { color: var(--absent); }
    .stats-compare .after-val  { color: var(--correct); }
  </style>
</head>
<body>

<!-- Stub element required by wordle.js IIFE (gameAppTemplate reads its innerHTML at load time) -->
<div id="header-container" style="display:none"></div>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Migration Harness</h1>
    <p>Left Wordle · prod-paula</p>
  </div>
  <ul id="fixture-list"></ul>
</aside>

<main id="content">
  <div id="placeholder">← Select a fixture to run migration</div>

  <div id="results" class="hidden">
    <h2 id="fixture-title"></h2>

    <div class="json-grid">
      <div class="panel">
        <div class="panel-head">
          <h3>Before</h3>
          <span class="badge">prod-gary localStorage</span>
        </div>
        <div class="json-view" id="before-json"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h3>After</h3>
          <span class="badge green" id="after-badge">after migration</span>
        </div>
        <div class="json-view" id="after-json"></div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="panel">
        <div class="panel-head">
          <h3>Statistics Modal</h3>
          <span class="badge green">after</span>
        </div>
        <div class="stats-body">
          <div id="stat-tiles"></div>
          <div id="distribution"></div>
          <div class="stats-compare" id="stats-compare"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h3>Migration Report</h3>
        </div>
        <ul id="summary-list"></ul>
      </div>
    </div>
  </div>
</main>

<script src="../src/storage-controller.js"></script>
<script src="../src/wordle.js"></script>
<script>
"use strict";

// ── Fixture manifest ──────────────────────────────────────────────────────────

const FIXTURES = [
  { id: '01', name: 'Fresh User',                     file: '01_fresh_user.json' },
  { id: '02', name: 'New User, Stats Only',           file: '02_new_user_stats_only.json' },
  { id: '03', name: 'Established, History Only',      file: '03_established_user_history_only.json' },
  { id: '04', name: 'Legacy Stats + History',         file: '04_user_with_legacy_and_history.json' },
  { id: '05', name: 'Mid-Game In Progress',           file: '05_mid_game_in_progress.json' },
  { id: '06', name: 'Legacy Flat Preferences',        file: '06_legacy_flat_preferences.json' },
  { id: '07', name: 'Hard Mode, Long Streak',         file: '07_hard_mode_long_streak.json' },
  { id: '08', name: 'Already Migrated to Paula',      file: '08_already_migrated_to_paula.json' },
  { id: '09', name: 'Legacy History Array Format',    file: '09_legacy_history_array.json' },
  { id: '10', name: 'Pre-History All Wins',           file: '10_prehistory_all_wins.json' },
  { id: '11', name: 'Insane Mode',                    file: '11_insane_mode.json' },
  { id: '12', name: 'Hard Mode Legacy Stand Alone',   file: '12_hard_mode_legacy_standalone.json' },
  { id: '13', name: 'Hard Mode Legacy No Game State', file: '13_hard_mode_legacy_no_game_state.json' },
  { id: '14', name: 'Hard Mode In Prefs',             file: '14_hard_mode_in_prefs.json' },
  { id: '15', name: 'Hard Mode Just Last Game',       file: '15_hard_mode_legacy_just_last_game.json' },
];

// ── Mock localStorage ────────────────────────────────────────────────────────
// Lets the real StorageController + StatisticsEngine run against fixture data
// without touching the browser's actual localStorage.

// Keys stored as plain strings (not JSON-encoded) by the real app.
const SCALAR_KEYS = new Set(['device_id', 'version']);

// Canonical key display order for the After panel.
const CANONICAL_KEYS = ['version', 'schema_version', 'device_id', 'statistics', 'gameState',
                        'history', 'legacy_stats', 'preferences', 'settingsBackup'];

function buildMockLocalStorage(fixture) {
  var store = {};
  Object.keys(fixture).forEach(function(key) {
    store[key] = SCALAR_KEYS.has(key) ? fixture[key] : JSON.stringify(fixture[key]);
  });
  return {
    _store: store,
    getItem:    function(k)    { return Object.prototype.hasOwnProperty.call(this._store, k) ? this._store[k] : null; },
    setItem:    function(k, v) { this._store[k] = String(v); },
    removeItem: function(k)    { delete this._store[k]; },
    get length()               { return Object.keys(this._store).length; },
    key:        function(i)    { return Object.keys(this._store)[i] || null; },
    clear:      function()     { this._store = {}; },
  };
}

function mockToStore(mock) {
  var out = {};
  Object.keys(mock._store).forEach(function(key) {
    var raw = mock._store[key];
    if (SCALAR_KEYS.has(key)) { out[key] = raw; return; }
    try { out[key] = JSON.parse(raw); } catch(e) { out[key] = raw; }
  });
  return out;
}

// ── Migration runner ──────────────────────────────────────────────────────────
// Drives real production code (StorageController + StatisticsEngine) via a
// swapped window.localStorage, then observes the result.

const FLAT_PREF_KEYS = ['darkTheme', 'colorBlindTheme', 'shareFormat', 'shareTextAdditions', 'hardMode'];

function runMigration(fixture) {
  var before = JSON.parse(JSON.stringify(fixture));
  var mock   = buildMockLocalStorage(fixture);
  var beforeStats, afterStats, afterPrefs, afterRaw, after;
  var changed = new Set();
  var removed = new Set();

  // window.localStorage is a getter-only property; direct assignment throws in strict mode.
  // Shadow it on window itself via defineProperty, then restore via the saved descriptor.
  var ownDesc = Object.getOwnPropertyDescriptor(window, 'localStorage');
  Object.defineProperty(window, 'localStorage', { value: mock, configurable: true, writable: true });

  try {
    var defaultStats = window.wordleTestExports.DEFAULT_STATISTICS;
    var defaultPrefs = window.wordleTestExports.DEFAULT_PREFERENCES;

    function mergeStats(stored) {
      var merged = Object.assign(JSON.parse(JSON.stringify(defaultStats)), stored || {});
      merged.guesses = Object.assign({}, defaultStats.guesses, (stored || {}).guesses || {});
      return merged;
    }

    beforeStats = mergeStats(window.StorageController.statistics.getAll());

    // Step 0 — Settings backup (mirrors index.html, runs before game load)
    window.StorageController.settingsBackup.maybeBackup('harness');

    // Step 1+2 — Statistics migration (mirrors GameApp.connectedCallback ~line 1842)
    window.wordleTestExports.preservePreHistoryStats();
    window.wordleTestExports.migrateIfNeeded();

    // Step 3 — Preference migration (PreferencesStorage._read auto-migrates flat keys)
    window.StorageController.preferences.getAll();

    // Step 4 — Hard mode inference from gameState when no pref or flat key existed
    window.wordleTestExports.migrateHardModeFromGameState();

    afterStats = mergeStats(window.StorageController.statistics.getAll());
    // Preferences: stored values merged onto defaults so all keys are always visible
    afterPrefs = Object.assign(JSON.parse(JSON.stringify(defaultPrefs)),
                               window.StorageController.preferences.getAll());

    afterRaw = mockToStore(mock);  // accurate stored state — used for diff computation

    // Compute diff from raw stored state (before display augmentation)
    var allKeys = new Set(Object.keys(before).concat(Object.keys(afterRaw)));
    allKeys.forEach(function(key) {
      if (!(key in afterRaw)) removed.add(key);
      else if (JSON.stringify(before[key]) !== JSON.stringify(afterRaw[key])) changed.add(key);
    });

    // Build display version in canonical key order.
    // Start with before keys (unchanged keys stay visible), overlay afterRaw,
    // drop removed keys, then apply display augmentations.
    after = Object.assign(JSON.parse(JSON.stringify(before)), JSON.parse(JSON.stringify(afterRaw)));
    removed.forEach(function(key) { delete after[key]; });
    after['statistics'] = afterStats;
    after['preferences'] = afterPrefs;

    // Ensure all canonical keys appear (null if absent)
    CANONICAL_KEYS.forEach(function(key) {
      if (!(key in after)) after[key] = null;
    });

    // Re-order so canonical keys come first, remaining keys after
    var ordered = {};
    CANONICAL_KEYS.forEach(function(key) { ordered[key] = after[key]; });
    Object.keys(after).forEach(function(key) { if (!(key in ordered)) ordered[key] = after[key]; });
    after = ordered;
  } finally {
    if (ownDesc) {
      Object.defineProperty(window, 'localStorage', ownDesc);
    } else {
      delete window.localStorage;
    }
  }


  // Generate human-readable report by observing what changed
  var report = [];

  if ('preferences' in before) {
    report.push({ type: 'skip', text: 'Preferences already namespaced',
                  detail: 'preferences{} key present — no flat-key migration needed' });
  } else {
    var flatFound = FLAT_PREF_KEYS.filter(function(k) { return k in before; });
    if (flatFound.length > 0) {
      report.push({ type: 'ok', text: 'Legacy preference keys migrated',
                    detail: flatFound.join(', ') + '  →  preferences{}' });
    } else {
      report.push({ type: 'skip', text: 'No flat preference keys found',
                    detail: 'preferences{} will be created with defaults on first read' });
    }
  }

  // hardMode inferred from gameState when no flat key or preferences.hardMode existed
  if (!('preferences' in before) && !('hardMode' in before)) {
    var gsHard = (before['gameState'] || {}).hardMode;
    if (gsHard) {
      report.push({ type: 'ok', text: 'Hard mode inferred from gameState',
                    detail: 'No hardMode flat key or preferences — gameState.hardMode: true  →  preferences.hardMode: true' });
    }
  }

  // preservePreHistoryStats: runs when versionNumber is set + no legacy_stats + stored > history
  var hadLegacyBefore = !!before['legacy_stats'];
  var hasLegacyAfter  = !!afterRaw['legacy_stats'];
  if (!hadLegacyBefore && hasLegacyAfter) {
    var synth = afterRaw['legacy_stats'] || {};
    var streakNote = synth.current_streak_length != null
      ? '  |  streak bridge: ' + synth.current_streak_length + ' pre-history wins ending ' + synth.current_streak_end_date
      : '';
    report.push({ type: 'ok', text: 'Synthetic legacy_stats created (preservePreHistoryStats)',
                  detail: 'pre-history games: ' + (synth.gamesPlayed || 0) + streakNote });
  }

  if ((beforeStats.versionNumber || 0) >= 2) {
    report.push({ type: 'skip', text: 'Statistics already at versionNumber 2',
                  detail: 'migratedBy: ' + (beforeStats.migratedBy || '?') });
  } else {
    var hasHistory = Object.keys(before['history'] || {}).length > 0;
    var hasLegacy  = !!before['legacy_stats'];
    var sources    = hasHistory && hasLegacy ? 'history + legacy_stats'
                   : hasHistory ? 'history only'
                   : hasLegacy  ? 'legacy_stats only'
                   : 'existing statistics preserved (no history or legacy_stats)';
    var streakBefore = beforeStats.currentStreak || 0;
    var streakAfter  = afterStats.currentStreak  || 0;
    var playedBefore = beforeStats.gamesPlayed   || 0;
    var playedAfter  = afterStats.gamesPlayed    || 0;

    report.push({ type: 'ok',
                  text: (hasHistory || hasLegacy) ? 'Statistics recomputed' : 'Statistics version-stamped',
                  detail: 'Source: ' + sources + '  |  '
                        + 'Played: ' + playedBefore + ' → ' + playedAfter + '  |  '
                        + 'Streak: ' + streakBefore + ' → ' + streakAfter });

    if (streakAfter !== streakBefore) {
      var delta = streakAfter - streakBefore;
      report.push({
        type: delta > 0 ? 'ok' : 'warn',
        text: 'Current streak ' + (delta > 0 ? 'increased' : 'decreased'),
        detail: streakBefore + ' → ' + streakAfter
                + (delta < 0 ? '  (history may not reflect full streak — check legacy_stats)' : ''),
      });
    }
  }

  var gs = before['gameState'] || {};
  if (gs.gameStatus === 'IN_PROGRESS') {
    report.push({ type: 'warn', text: 'Mid-game state detected',
                  detail: 'Puzzle #' + (gs.puzzleNum || '?') + ' is IN_PROGRESS — migration will not interrupt it' });
  }

  return { before, after, report, changed, removed, beforeStats, afterStats };
}

// ── JSON renderer with diff highlights ───────────────────────────────────────

function syntaxHighlight(str) {
  return str
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("[\w@._\- ]+")\s*:/g, '<span class="jk">$1</span>:')
    .replace(/:\s*("(?:[^"\\]|\\.)*")/g, (m, s) => ': <span class="js">' + s + '</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="jn">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span class="jb">$1</span>')
    .replace(/:\s*(null)/g, ': <span class="jx">$1</span>');
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderKeyBlock(key, value, cssClass) {
  var keyHtml = '<span class="jk">"' + escHtml(key) + '"</span>';
  var cls = 'key-block' + (cssClass ? ' ' + cssClass : '');

  if (value !== null && typeof value === 'object') {
    var hint = '<span class="jx">' + (Array.isArray(value) ? '[…]' : '{…}') + '</span>';
    var body = syntaxHighlight(JSON.stringify(value, null, 2));
    return '<details class="' + cls + '" open>'
      + '<summary class="key-summary"><span class="key-toggle"></span>' + keyHtml + ': ' + hint + '</summary>'
      + '<pre class="key-value">' + body + '</pre>'
      + '</details>';
  }

  var scalar = syntaxHighlight(JSON.stringify(value));
  return '<div class="' + cls + ' key-scalar">' + keyHtml + ': ' + scalar + '</div>';
}

function renderJsonWithDiff(obj, changedKeys) {
  return Object.keys(obj).map(function(key) {
    return renderKeyBlock(key, obj[key], changedKeys && changedKeys.has(key) ? 'added' : '');
  }).join('');
}

// ── Stats modal renderer ──────────────────────────────────────────────────────

function renderStats(stats, beforeStats) {
  var tilesEl = document.getElementById('stat-tiles');
  var distEl  = document.getElementById('distribution');
  var cmpEl   = document.getElementById('stats-compare');
  tilesEl.innerHTML = '';
  distEl.innerHTML  = '';
  cmpEl.innerHTML   = '';

  if (!stats) {
    distEl.innerHTML = '<div class="no-data">No stats</div>';
    return;
  }

  var TILES = [
    { key: 'gamesPlayed',   label: 'Played'   },
    { key: 'winPercentage', label: 'Win %'     },
    { key: 'currentStreak', label: 'Streak'    },
    { key: 'maxStreak',     label: 'Max'       },
    { key: 'averageGuesses',label: 'Av. Guess' },
  ];

  TILES.forEach(function(t) {
    var val = stats[t.key] !== undefined ? stats[t.key] : 0;
    if (t.key === 'averageGuesses') val = (Number(val) || 0).toFixed(2);
    var tile = document.createElement('div');
    tile.className = 'stat-tile';
    tile.innerHTML = '<div class="val">' + val + '</div><div class="lbl">' + t.label + '</div>';
    tilesEl.appendChild(tile);
  });

  var g = stats.guesses || {};
  var vals = [1,2,3,4,5,6].map(k => g[k] || 0);
  var maxV = Math.max(...vals, 1);
  var allZero = vals.every(v => v === 0);

  if (allZero) {
    distEl.innerHTML = '<div class="no-data">No Data</div>';
  } else {
    [1,2,3,4,5,6].forEach(function(i) {
      var count = g[i] || 0;
      var pct   = Math.max(7, Math.round(count / maxV * 100));
      var row   = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = '<span class="bar-num">' + i + '</span>'
        + '<div class="bar-track"><div class="bar" style="width:' + pct + '%">' + count + '</div></div>';
      distEl.appendChild(row);
    });
  }

  // Before vs after streak comparison
  if (beforeStats && (beforeStats.currentStreak !== undefined)) {
    cmpEl.innerHTML =
      'streak before: <span class="before-val">' + (beforeStats.currentStreak || 0) + '</span>'
      + '&nbsp;&nbsp;after: <span class="after-val">' + (stats.currentStreak || 0) + '</span>'
      + '&nbsp;&nbsp;played before: <span class="before-val">' + (beforeStats.gamesPlayed || 0) + '</span>'
      + '&nbsp;&nbsp;after: <span class="after-val">' + (stats.gamesPlayed || 0) + '</span>';
  }
}

// ── Migration report renderer ─────────────────────────────────────────────────

function renderReport(report) {
  var list = document.getElementById('summary-list');
  list.innerHTML = '';

  if (!report.length) {
    list.innerHTML = '<li class="s-item"><span class="s-text" style="color:var(--muted)">Nothing to do</span></li>';
    return;
  }

  report.forEach(function(item) {
    var li = document.createElement('li');
    li.className = 's-item';
    var icon = item.type === 'ok' ? '✓' : item.type === 'warn' ? '!' : '–';
    li.innerHTML =
      '<span class="s-icon ' + (item.type === 'skip' ? 'skip' : item.type === 'warn' ? 'warn' : 'ok') + '">' + icon + '</span>'
      + '<div class="s-text">' + item.text
      + (item.detail ? '<div class="s-detail">' + item.detail + '</div>' : '')
      + '</div>';
    list.appendChild(li);
  });
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

var listEl = document.getElementById('fixture-list');
FIXTURES.forEach(function(f) {
  var li = document.createElement('li');
  li.innerHTML = '<span class="num">' + f.id + '</span><span class="label">' + f.name + '</span>';
  li.addEventListener('click', function() {
    document.querySelectorAll('#fixture-list li').forEach(el => el.classList.remove('active'));
    li.classList.add('active');
    loadFixture(f);
  });
  listEl.appendChild(li);
});

// ── Load & run ────────────────────────────────────────────────────────────────

function loadFixture(f) {
  fetch('./fixtures/local_storage/' + f.file)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(fixture) {
      var result;
      try {
        result = runMigration(fixture);
      } catch(e) {
        alert('Migration failed for ' + f.file + ':\n' + e.message
          + (window.StorageController === undefined
              ? '\n\nStorageController not loaded — serve from client root:\n  npx serve . -p 3001\n  # open http://localhost:3001/migration_tests/migration-test.html'
              : ''));
        return;
      }

      document.getElementById('placeholder').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
      document.getElementById('fixture-title').textContent = f.id + ' — ' + f.name;

      document.getElementById('before-json').innerHTML =
        renderJsonWithDiff(result.before, null, null);

      document.getElementById('after-json').innerHTML =
        renderJsonWithDiff(result.after, result.changed, result.removed);

      renderStats(result.afterStats, result.beforeStats);
      renderReport(result.report);
    })
    .catch(function(err) {
      alert(
        'Could not load ' + f.file + ':\n' + err.message
        + '\n\nServe from the client root:\n  cd ~/repos/jswright61/left_wordle/client\n  npx serve . -p 3001\n  # then open http://localhost:3001/migration_tests/migration-test.html'
      );
    });
}
</script>
